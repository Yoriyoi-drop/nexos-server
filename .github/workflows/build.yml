name: NexOS Build & Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison libelf-dev libssl-dev \
            libncurses-dev bc cpio xorriso mtools zstd wget python3 python3-pip \
            git meson ninja-build pkg-config libpam0g-dev libapparmor-dev \
            libaudit-dev libcap-ng-dev libmount-dev libblkid-dev
      - name: Get kernel source
        run: |
          if [ ! -d linux-7.1 ]; then
            wget -q https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.tar.xz
            tar xf linux-7.1.tar.xz
          fi
      - name: Copy kernel config
        run: cp configs/kernel.config linux-7.1/.config
      - name: Build kernel
        run: |
          cd linux-7.1
          make olddefconfig
          make -j$(nproc) bzImage modules 2>&1 | tail -5
      - name: Test script
        run: bash test.sh
